# https://wiki.ubuntu.com/Releases
# https://cloud-images.ubuntu.com
- name: Ubuntu
  code: ubuntu
  cloud_image_base_url: !unsafe "https://cloud-images.ubuntu.com/{{ release.name }}"
  cloud_image_file_name: !unsafe "{{ release.name }}-server-cloudimg-{{ arch.type }}.img"
  cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_version_pattern }}/{{ cloud_image_file_name }}"
  cloud_image_checksum_type: sha256
  cloud_image_checksum_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_version_pattern }}/SHA256SUMS"
  cloud_image_version_filter: !unsafe '(?P<major>\\d{8})(?:\\.(?P<minor>\\d+))?'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_major }}{{ '.'+cloud_image_minor if cloud_image_minor != None else '' }}"
  disk_format: qcow2
  pup_filter: "'a text{}'"
  awk_filter: "-F/ '/[0-9]{8}\\.?[0-9]*/{ print $1 }'"
  releases:
  - name: resolute
    version: "26.04"
    description: Ubuntu 26.04 LTS (Resolute Racoon)
    eos: June 2031
    eol: April 2038
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: noble
    version: "24.04"
    description: Ubuntu 24.04 LTS (Noble Numbat)
    eos: June 2029
    eol: April 2036
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: jammy
    version: "22.04"
    description: Ubuntu 22.04 LTS (Jammy Jellyfish)
    eos: June 2027
    eol: April 2034
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: focal
    version: "20.04"
    description: Ubuntu 20.04 LTS (Focal Fossa)
    eos: April 2025
    eol: April 2032
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: bionic
    version: "18.04"
    description: Ubuntu 18.04 LTS (Bionic Beaver)
    eos: June 2023
    eol: April 2030
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: xenial
    version: "16.04"
    description: Ubuntu 16.04 LTS (Xenial Xerus)
    eos: April 2021
    eol: April 2028
    cloud_image_file_name: !unsafe "{{ release.name }}-server-cloudimg-{{ arch.type }}-disk1.img"
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: trusty
    version: "14.04"
    description: Ubuntu 14.04 LTS (Trusty Tahr)
    eos: April 2019
    eol: April 2026
    cloud_image_file_name: !unsafe "{{ release.name }}-server-cloudimg-{{ arch.type }}-disk1.img"
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
