  cloud_image_checksum_url: !unsafe "{{ cloud_image_base_url }}/Fedora-Cloud-{{ release.name }}-{{ cloud_image_version }}-{{ arch.type }}-CHECKSUM"
  cloud_image_version_filter: !unsafe 'Fedora-Cloud-Base-Generic-{{ release.name }}-(?P<version>\\d+\\.\\d+)\\.{{ arch.type }}\\.{{ distro.disk_format }}$'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_version }}"
