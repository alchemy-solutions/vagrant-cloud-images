---
# semantic_version = <major>[.<minor>[.<patch>]][-<build>]

distros:
# https://endoflife.date/almalinux
# https://wiki.almalinux.org/release-notes/
- name: AlmaLinux
  code: almalinux
  cloud_image_base_url: !unsafe "https://repo.almalinux.org/almalinux/{{ release.name }}/cloud/{{ arch.type }}/images"
  cloud_image_file_name: !unsafe "AlmaLinux-{{ release.name }}-GenericCloud-{{ cloud_image_major }}.{{ cloud_image_minor }}{{ '-'+cloud_image_patch if cloud_image_patch != None else '' }}.{{ arch.type }}.{{ distro.disk_format }}"
  cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_file_name }}"
  cloud_image_checksum_type: sha256
  cloud_image_checksum_url: !unsafe "{{ cloud_image_base_url }}/CHECKSUM"
  cloud_image_version_filter: !unsafe 'GenericCloud-(?P<major>\\d+)\\.(?P<minor>\\d+)(?:-(?P<patch>\\d+(?:\\.\\d+)?))?'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_major }}.{{ cloud_image_minor }}{{ '.'+cloud_image_patch if cloud_image_patch != None else '' }}"
  disk_format: qcow2
  releases:
  - name: "10"
    version: "10"
    description: AlmaLinux 10
    eos: May 2030
    eol: May 2035
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "9"
    version: "9"
    description: AlmaLinux 9
    eos: May 2027
    eol: May 2032
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "8"
    version: "8"
    description: AlmaLinux 8
    eos: May 2024
    eol: Mar 2029
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64

# https://alpinelinux.org/releases/
- name: Alpine Linux
  code: alpine
  cloud_image_base_url: !unsafe "https://dl-cdn.alpinelinux.org/alpine/{{ release.name }}/releases/cloud"
  cloud_image_file_name: !unsafe "nocloud_alpine-{{ cloud_image_version }}-{{ arch.type }}-uefi-cloudinit-{{ cloud_image_build }}.{{ distro.disk_format }}"
  cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_file_name }}"
  cloud_image_checksum_type: sha512
  cloud_image_checksum_url: !unsafe "{{ cloud_image_url }}.{{ cloud_image_checksum_type }}"
  cloud_image_version_filter: !unsafe 'nocloud_alpine-(?P<version>\\d+\\.\\d+\\.\\d+)-{{ arch.type }}-uefi-cloudinit-(?P<build>r\\d+)\\.{{ distro.disk_format }}$'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_version }}-{{ cloud_image_build }}"
  disk_format: qcow2
  releases:
  - name: "v3.23"
    version: "3.23"
    description: Alpine Linux v3.23
    eos: Nov 2027
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "v3.22"
    version: "3.22"
    description: Alpine Linux v3.22
    eos: May 2027
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "v3.21"
    version: "3.21"
    description: Alpine Linux v3.21
    eos: Nov 2026
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "v3.20"
    version: "3.20"
    description: Alpine Linux v3.20
    eos: Apr 2026
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "v3.19"
    version: "3.19"
    description: Alpine Linux v3.19
    eos: Nov 2025
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64

# https://fastly.mirror.pkgbuild.com/images/latest/
- name: Arch Linux
  code: arch
  cloud_image_base_url: !unsafe "https://fastly.mirror.pkgbuild.com/images/latest"
  cloud_image_file_name: !unsafe "Arch-Linux-{{ arch.type }}-cloudimg-{{ cloud_image_version }}.{{ distro.disk_format }}"
  cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_file_name }}"
  cloud_image_checksum_type: sha256
  cloud_image_checksum_url: !unsafe "{{ cloud_image_url }}.SHA256"
  cloud_image_version_filter: !unsafe 'Arch-Linux-{{ arch.type }}-cloudimg-(?P<version>\\d+\\.\\d+)\\.{{ distro.disk_format }}$'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_version }}"
  disk_format: qcow2
  releases:
  - name: "Linux"
    code: "linux"
    description: Arch Linux
    arch:
    - name: amd64
      type: x86_64

# https://endoflife.date/centos-stream
# https://cloud.centos.org/centos/
- name: CentOS
  code: centos
  cloud_image_base_url: !unsafe "https://cloud.centos.org/centos/{{ release.code }}/{{ arch.type }}/images"
  cloud_image_file_name: !unsafe "CentOS-Stream-GenericCloud-{{ release.version }}-{{ cloud_image_version }}.{{ arch.type }}.{{ distro.disk_format }}"
  cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_file_name }}"
  cloud_image_checksum_type: sha256
  cloud_image_checksum_url: !unsafe "{{ cloud_image_base_url }}/CHECKSUM"
  cloud_image_version_filter: !unsafe 'CentOS-Stream-GenericCloud-{{ release.version }}-(?P<version>\\d+\\.\\d+)\\.{{ arch.type }}\\.{{ distro.disk_format }}$'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_version }}"
  disk_format: qcow2
  releases:
  - name: "Stream 10"
    code: "10-stream"
    version: "10"
    description: CentOS Stream 10
    eos: Jan 2030
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "Stream 9"
    code: "9-stream"
    version: "9"
    description: CentOS Stream 9
    eos: May 2027
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64
  - name: "Stream 8"
    code: "8-stream"
    version: "8"
    description: CentOS Stream 8
    eos: May 2024
    arch:
    - name: amd64
      type: x86_64
    # Unsupported kernel with 64K pagesize on Qemu and VirtualBox ARM
    - name: arm64
      type: aarch64
  - name: "8"
    code: "8"
    version: "8"
    description: CentOS 8
    cloud_image_base_url: !unsafe "https://cloud.centos.org/centos/{{ release.version }}/{{ arch.type }}/images"
    cloud_image_file_name: !unsafe "CentOS-{{ release.version }}-GenericCloud-{{ cloud_image_version }}-{{ cloud_image_build }}.{{ arch.type }}.{{ distro.disk_format }}"
    cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_file_name }}"
    cloud_image_checksum_url: !unsafe "{{ cloud_image_base_url }}/CHECKSUM"
    cloud_image_version_filter: !unsafe 'CentOS-{{ release.version }}-GenericCloud-(?P<version>\\d+\\.\\d+\\.\\d+)-(?P<build>\\d+\\.\\d+)\\.{{ arch.type }}\\.{{ distro.disk_format }}$'
    cloud_image_version_pattern: !unsafe "{{ cloud_image_version }}"
    eol: Dec 2021
    arch:
    - name: amd64
      type: x86_64
    # Unsupported kernel with 64K pagesize on Qemu and VirtualBox ARM
    - name: arm64
      type: aarch64
  - name: "7"
    code: "7"
    version: "7"
    description: CentOS 7
    cloud_image_base_url: !unsafe "https://cloud.centos.org/centos/{{ release.version }}/images"
    cloud_image_file_name: !unsafe "CentOS-{{ release.version }}-{{ arch.type }}-GenericCloud-{{ cloud_image_version }}.{{ distro.disk_format }}"
    cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_file_name }}"
    # Checksum file not updated... :(
    cloud_image_checksum_url: ""
    cloud_image_version_filter: !unsafe 'CentOS-{{ release.version }}-{{ arch.type }}-GenericCloud-(?P<version>\\d+)\\.{{ distro.disk_format }}$'
    cloud_image_version_pattern: !unsafe "{{ cloud_image_version }}"
    eol: Jun 2024
    arch:
    - name: amd64
      type: x86_64
    - name: arm64
      type: aarch64

# https://wiki.debian.org/LTS
# https://cloud.debian.org/images/cloud/
- name: Debian
  code: debian
  cloud_image_base_url: !unsafe "https://cloud.debian.org/images/cloud/{{ release.name }}"
  cloud_image_file_name: !unsafe "{{ distro.code }}-{{ release.version }}-generic-{{ arch.type }}-{{ cloud_image_major }}-{{ cloud_image_minor }}.{{ distro.disk_format }}"
  cloud_image_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_major }}-{{ cloud_image_minor }}/{{ cloud_image_file_name }}"
  cloud_image_checksum_type: sha512
  cloud_image_checksum_url: !unsafe "{{ cloud_image_base_url }}/{{ cloud_image_major }}-{{ cloud_image_minor }}/SHA512SUMS"
  cloud_image_version_filter: !unsafe '(?P<major>\\d{8})-(?P<minor>\\d+)'
  cloud_image_version_pattern: !unsafe "{{ cloud_image_major }}.{{ cloud_image_minor }}"
  disk_format: qcow2
  releases:
  - name: trixie
    version: "13"
    description: Debian 13 (Trixie)
    eos: August 2028
    eol: August 2030
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: bookworm
    version: "12"
    description: Debian 12 (Bookworm)
    eos: June 2026
    eol: June 2028
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: bullseye
    version: "11"
    description: Debian 11 (Bullseye)
    eos: August 2024
    eol: June 2026
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64
  - name: buster
    version: "10"
    description: Debian 10 (Buster)
    eos: August 2022
    eol: June 2024
    arch:
    - name: amd64
      type: amd64
    - name: arm64
      type: arm64

# https://fedorapeople.org/groups/schedule
# https://fedoraproject.org/cloud/download
- name: Fedora
