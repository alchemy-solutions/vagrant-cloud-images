---
- name: Create Docker image for guestfs
  community.docker.docker_image_build:
    path: "{{ docker_path }}"
    name: "guestfs:latest"

- name: Create guestfs container
  community.docker.docker_container:
    name: guestfs
    image: guestfs:latest
    recreate: true
    command: sleep infinity
    volumes:
    - "{{ build_path }}:/build:rw"

- name: Inject Vagrant cloud-init configuration file
  community.docker.docker_container_exec:
    container: guestfs
    command: guestfish -a /build/{{ vagrant_disk_file }} -i upload /build/99_vagrant.cfg /etc/cloud/cloud.cfg.d/99_vagrant.cfg

- name: Remove guestfs container
  community.docker.docker_container:
    name: guestfs
    state: absent
