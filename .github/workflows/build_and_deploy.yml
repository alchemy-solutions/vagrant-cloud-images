name: Build and Deploy

on:
  schedule:
  - cron: '15 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - id: hcp_auth
      uses: hashicorp/hcp-auth-action@v0
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      with:
        workload_identity_provider: 'iam/project/cdb1b80e-a7cd-4d5c-a9a2-3a93079d6a36/service-principal/github/workload-identity-provider/github-vagrant-cloud-images'
        set_access_token: true
    - uses: hashicorp/hcp-setup-action@v0
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      with:
        version: 'latest'
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libguestfs-tools qemu-utils
        sudo chmod 0644 /boot/vmlinuz*
    - name: Build README.md
      run: |
        git config --global user.name 'Ettore Simone'
        git config --global user.email '1446844+signal-09@users.noreply.github.com'
        ansible-playbook ansible/readme.yaml
        TEXT=$(git diff README.md | awk -F'|' '/^\+.*Expired \|/{ print "*" $2 }')
        if [[ -n "$TEXT" ]]; then
            git add README.md
            git commit -m "Expired distro"$'\n'$'\n'"${TEXT}"
            git push
        fi
    - name: Build images
      env:
        VAGRANT_CLOUD_TOKEN: ${{ steps.hcp_auth.outputs.access_token }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        MAIL_USERNAME: ${{ vars.MAIL_USERNAME }}
        MAIL_FROM: ${{ vars.MAIL_FROM }}
        MAIL_TO: ${{ vars.MAIL_TO }}
        SMTP_SERVER: ${{ vars.SMTP_SERVER }}
        SMTP_PORT: ${{ vars.SMTP_PORT }}
      run: |
        ansible-playbook -e verbuse=true -e guestfs=guestfish ansible/site.yaml
